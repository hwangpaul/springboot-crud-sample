# Server Configuration
server.port=8080

# Application Name
spring.application.name=crud-sample

# Oracle Database Configuration
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=sample_user
spring.datasource.password=sample_password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.sample.crud.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-executor-type=REUSE
mybatis.configuration.jdbc-type-for-null=NULL

# Logging
logging.level.com.sample.crud=INFO
logging.level.com.sample.crud.mapper=DEBUG
